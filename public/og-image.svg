<svg xmlns="http://www.w3.org/2000/svg" viewBox="1200 630 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0D0D0C"/>
      <stop offset="100%" stop-color="#1a1a19"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Brand mark -->
  <g transform="translate(100, 200)">
    <!-- AX monogram -->
    <text font-family="system-ui, -apple-system, sans-serif" font-size="180" font-weight="800" fill="#6150F6" letter-spacing="-8" x="0" y="160">AX</text>
  </g>
  <!-- Studio name -->
  <text font-family="system-ui, -apple-system, sans-serif" font-size="56" font-weight="700" fill="#ffffff" letter-spacing="-2" x="100" y="440">Aesthetix Studio</text>
  <!-- Tagline -->
  <text font-family="system-ui, -apple-system, sans-serif" font-size="24" fill="#888888" letter-spacing="0" x="100" y="490">Design · Development · Branding</text>
  <!-- Accent line -->
  <rect x="100" y="520" width="80" height="4" rx="2" fill="#6150F6"/>
  <!-- URL -->
  <text font-family="system-ui, -apple-system, sans-serif" font-size="20" fill="#555555" x="100" y="560">aesthetixstudio.dev</text>
</svg>
